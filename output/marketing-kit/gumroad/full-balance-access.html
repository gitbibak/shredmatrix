<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Full Balance Free Access</title>
    <style>
      :root {
        color-scheme: dark;
        background: #060914;
        color: #f7f9ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          linear-gradient(135deg, rgba(255, 122, 0, 0.18), transparent 34%),
          linear-gradient(225deg, rgba(56, 189, 248, 0.16), transparent 32%),
          #060914;
      }
      main {
        width: min(720px, 100%);
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 18px;
        padding: 32px;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      }
      h1 {
        margin: 0 0 14px;
        font-size: clamp(30px, 7vw, 54px);
        line-height: 1;
      }
      p {
        color: #cbd5e1;
        font-size: 18px;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        margin-top: 18px;
        padding: 14px 18px;
        border-radius: 12px;
        background: #ff7a00;
        color: #111827;
        font-weight: 800;
        text-decoration: none;
      }
      .promise {
        color: #facc15;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Full Balance</h1>
      <p class="promise">Completely free. Always free. No subscription, no card, no paywall.</p>
      <p>Track workouts, nutrition, water, sleep, measurements and achievements from one mobile-first wellness dashboard.</p>
      <a href="https://fullbalance.app">Open fullbalance.app</a>
    </main>
  </body>
</html>
